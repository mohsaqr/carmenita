name: Deploy to GitHub Pages

on:
  # Publish on every push to main so `git push` is the deploy step.
  push:
    branches: [main]
  # Allow ad-hoc manual deploys from the Actions tab.
  workflow_dispatch:

# Allow exactly one concurrent deployment. Queue a new run if one is
# already underway, then publish the most recent. This mirrors the
# official GitHub Pages starter workflow.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # `npm install` rather than `npm ci` because the lockfile
        # generated on macOS records platform-specific esbuild binaries
        # in a way that `npm ci` on Linux chokes on (EBADPLATFORM for
        # the darwin/netbsd/etc variants). `install` is more forgiving
        # and will skip optional deps that don't match the runner's
        # platform — which is exactly what we want.
        run: npm install --no-audit --no-fund

      # `better-sqlite3` is needed at build time for the static-params
      # helper that enumerates the 14 shipped quiz IDs from carmenita.db.
      # `npm install` above already compiles it via node-gyp.

      - name: Build static site
        # PAGES_BASE_PATH must match the Pages deployment path:
        #   - User/org sites (user.github.io)         → ""
        #   - Project sites  (user.github.io/<repo>)  → "/<repo>"
        env:
          PAGES_BASE_PATH: /carmenita
        run: ./scripts/build-static.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
